services:
  gitlab:
    build:
      context: ../gitlab-ce
      args:
        GITLAB_VERSION: ${GITLAB_VERSION}
    image: argus-insight/gitlab-ce:${GITLAB_VERSION}
    hostname: gitlab.argus.local
    ports:
      - "8929:80"
      - "8443:443"
      - "2224:22"
    volumes:
      - argus-gitlab-config:/etc/gitlab
      - argus-gitlab-logs:/var/log/gitlab
      - argus-gitlab-data:/var/opt/gitlab
    environment:
      GITLAB_OMNIBUS_CONFIG: "from_file('/etc/gitlab/gitlab.rb')"
    shm_size: "256m"
    ulimits:
      nofile:
        soft: 100000
        hard: 100000
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "gitlab-healthcheck", "--fail", "--max-time", "10"]
      interval: 60s
      timeout: 30s
      retries: 5
      start_period: 300s

  gitlab-runner:
    build:
      context: ../gitlab-runner
      args:
        GITLAB_RUNNER_VERSION: ${GITLAB_RUNNER_VERSION}
    image: argus-insight/gitlab-runner:${GITLAB_RUNNER_VERSION}
    volumes:
      - argus-gitlab-runner-config:/etc/gitlab-runner
      - /var/run/docker.sock:/var/run/docker.sock
    depends_on:
      gitlab:
        condition: service_healthy
    restart: unless-stopped

volumes:
  argus-gitlab-config:
  argus-gitlab-logs:
  argus-gitlab-data:
  argus-gitlab-runner-config:
